name: Kigo

options:
  bundleIdPrefix: com.tomeitotameigo
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"

targets:
  Kigo:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Kigo
      - path: Resources/manifest.json
        buildPhase: resources
    dependencies:
      - target: KigoWidgetExtension
        embed: true
    entitlements:
      # App Group so the main app and the widget extension share the same
      # UserDefaults suite (group.com.tomeitotameigo.kigo). Without this the
      # entitlement flag the app writes and the flag the widget reads land in
      # separate `.standard` containers, so the subscriber image never shows.
      path: Sources/Kigo/Kigo.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.tomeitotameigo.kigo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomeitotameigo.kigo
        PRODUCT_NAME: Kigo
        INFOPLIST_FILE: Sources/Kigo/Info.plist
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: S25KR8TV8T

  KigoWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/KigoWidgetExtension
      # Shared Foundation-only types reused by the widget extension (AC4: no hand-edits to xcodeproj).
      # These files are listed individually to avoid pulling in SwiftUI files from Sources/Kigo.
      - path: Sources/Kigo/Manifest.swift
      - path: Sources/Kigo/DayKey.swift
      - path: Sources/Kigo/DateProvider.swift
      - path: Sources/Kigo/TodayResolution.swift
      - path: Sources/Kigo/ContentSource.swift
      # Slice #71: EntitlementSharedStore protocol + UserDefaultsEntitlementStore — Foundation-only
      # (no StoreKit) so the widget extension can read the active flag from the app-group store.
      - path: Sources/Kigo/EntitlementSharedStore.swift
      # Slice #73: KigoPlaceholderView (SwiftUI, no StoreKit) — deterministic gradient placeholder
      # reused by KigoWidgetView for the image layer (ADR 0001 / J2).
      - path: Sources/Kigo/KigoPlaceholder.swift
      # Slice #73: manifest.json bundled into the widget extension so the TimelineProvider can
      # load content without the app process running (ADR 0012).
      # NOTE: must be a `sources` entry with `buildPhase: resources` — XcodeGen has no
      # top-level `resources:` target key, so the previous `resources:` block was silently
      # ignored and the manifest never made it into the .appex (widget showed only the
      # redacted placeholder because the timeline provider could not load content).
      - path: Resources/manifest.json
        buildPhase: resources
    entitlements:
      # Same App Group as the host app so the widget reads the entitlement flag
      # from the shared UserDefaults suite (see EntitlementSharedStore).
      path: Sources/KigoWidgetExtension/KigoWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.tomeitotameigo.kigo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomeitotameigo.kigo.widgets
        PRODUCT_NAME: KigoWidgetExtension
        INFOPLIST_FILE: Sources/KigoWidgetExtension/Info.plist
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: S25KR8TV8T

  KigoTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/KigoTests
    dependencies:
      - target: Kigo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomeitotameigo.kigoTests
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_ALLOWED: "NO"

  KigoUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/KigoUITests
    dependencies:
      - target: Kigo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomeitotameigo.kigoUITests
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_ALLOWED: "NO"

  KigoWidgetTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      # Test sources
      - path: Tests/KigoWidgetTests
      # Widget extension sources (excluding KigoWidget.swift which has @main)
      - path: Sources/KigoWidgetExtension/KigoWidgetEntry.swift
      - path: Sources/KigoWidgetExtension/WidgetTimelineBuilder.swift
      # Slice #73: KigoWidgetView extracted to its own file so it can be compiled into KigoWidgetTests.
      - path: Sources/KigoWidgetExtension/KigoWidgetView.swift
      # Shared Foundation-only types from the Kigo app target
      - path: Sources/Kigo/Manifest.swift
      - path: Sources/Kigo/DayKey.swift
      - path: Sources/Kigo/DateProvider.swift
      - path: Sources/Kigo/TodayResolution.swift
      - path: Sources/Kigo/ContentSource.swift
      # Slice #71: EntitlementSharedStore protocol — Foundation-only (no StoreKit).
      - path: Sources/Kigo/EntitlementSharedStore.swift
      # Slice #73: KigoPlaceholderView (SwiftUI) for image rendering in KigoWidgetView.
      - path: Sources/Kigo/KigoPlaceholder.swift
      # Slice #81: manifest.json bundled into KigoWidgetTests so BundledContentSource()
      # can resolve it via Bundle(for:) / Bundle.main without injecting a hand-built Manifest.
      # Must be a `sources` entry with `buildPhase: resources` — XcodeGen has no top-level
      # `resources:` target key (same pattern as the app and widget extension targets).
      - path: Resources/manifest.json
        buildPhase: resources
    dependencies:
      - sdk: WidgetKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomeitotameigo.kigoWidgetTests
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_ALLOWED: "NO"

  # J4 manual lane (ADR 0009): the ONE place the production StoreKit adapters are
  # exercised end-to-end against a real (local test) storekitd via SKTestSession.
  # Deliberately NOT a target of the `Kigo` scheme's test action, so the canonical
  # `xcodebuild test -scheme Kigo` loop invocation never builds or runs it. Run it
  # intentionally from Xcode via the `KigoStoreKitIntegrationTests` scheme (Cmd+U) —
  # SKTestSession only works through the IDE launch path; from the public CLI it
  # errors or hangs. The gating suites (C6/C9/C10) never touch this target.
  KigoStoreKitIntegrationTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/KigoStoreKitIntegrationTests
      # The local StoreKit config, bundled so SKTestSession(configurationFileNamed:)
      # can load it by name. Same buildPhase:resources pattern as manifest.json
      # (XcodeGen has no top-level `resources:` target key).
      - path: Products.storekit
        buildPhase: resources
    dependencies:
      - target: Kigo
      - sdk: StoreKitTest.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomeitotameigo.kigoStoreKitIntegrationTests
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_ALLOWED: "NO"

schemes:
  Kigo:
    build:
      targets:
        Kigo: all
        KigoWidgetExtension: all
    run:
      config: Debug
      # Local StoreKit Testing config for the J4 manual lane: with this attached to
      # the Run action, Cmd+R in Xcode exercises the REAL Product.purchase() sheet,
      # restore, and product loading against a local storekitd — no App Store
      # Connect, no account, no money. Deliberately ONLY on `run`, never on `test`:
      # driving real StoreKit under `xcodebuild test` from the CLI hangs and would
      # wedge the headless loop (ADR 0009). The gating test suites use injected
      # fakes (C6/C9/C10) and never touch this file.
      storeKitConfiguration: Products.storekit
    test:
      config: Debug
      targets:
        - name: KigoTests
          parallelizable: false
        - name: KigoUITests
          parallelizable: false
        - name: KigoWidgetTests
          parallelizable: false
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  KigoWidgetExtension:
    build:
      targets:
        KigoWidgetExtension: all
    run:
      config: Debug
    analyze:
      config: Debug
    archive:
      config: Release

  # IDE-only scheme for the SKTestSession integration lane (ADR 0009). Select it in
  # Xcode and press Cmd+U to exercise the real StoreKit adapters against a local
  # test storekitd. The test action sets KIGO_RUN_STOREKIT_INTEGRATION=1 so the
  # tests opt in; under any run WITHOUT that variable (e.g. if this target were ever
  # pulled onto a headless path) the tests XCTSkip before touching StoreKit, so they
  # cannot hang. Do NOT run this scheme via `xcodebuild test` from the CLI — drive it
  # only through the Xcode IDE.
  KigoStoreKitIntegrationTests:
    build:
      targets:
        Kigo: all
        KigoWidgetExtension: all
    test:
      config: Debug
      environmentVariables:
        KIGO_RUN_STOREKIT_INTEGRATION: "1"
      targets:
        - name: KigoStoreKitIntegrationTests
          parallelizable: false
