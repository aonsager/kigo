name: Kigo

options:
  bundleIdPrefix: com.tomeitotameigo
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGNING_ALLOWED: "NO"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"

targets:
  Kigo:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Kigo
      - path: Resources/manifest.json
        buildPhase: resources
    dependencies:
      - target: KigoWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomeitotameigo.kigo
        PRODUCT_NAME: Kigo
        INFOPLIST_FILE: Sources/Kigo/Info.plist
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_ALLOWED: "NO"

  KigoWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/KigoWidgetExtension
      # Shared Foundation-only types reused by the widget extension (AC4: no hand-edits to xcodeproj).
      # These files are listed individually to avoid pulling in SwiftUI files from Sources/Kigo.
      - path: Sources/Kigo/Manifest.swift
      - path: Sources/Kigo/DayKey.swift
      - path: Sources/Kigo/DateProvider.swift
      - path: Sources/Kigo/TodayResolution.swift
      - path: Sources/Kigo/ContentSource.swift
      # Slice #71: EntitlementSharedStore protocol + UserDefaultsEntitlementStore — Foundation-only
      # (no StoreKit) so the widget extension can read the active flag from the app-group store.
      - path: Sources/Kigo/EntitlementSharedStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomeitotameigo.kigo.widgets
        PRODUCT_NAME: KigoWidgetExtension
        INFOPLIST_FILE: Sources/KigoWidgetExtension/Info.plist
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_ALLOWED: "NO"

  KigoTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/KigoTests
    dependencies:
      - target: Kigo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomeitotameigo.kigoTests
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_ALLOWED: "NO"

  KigoUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/KigoUITests
    dependencies:
      - target: Kigo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomeitotameigo.kigoUITests
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_ALLOWED: "NO"

  KigoWidgetTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      # Test sources
      - path: Tests/KigoWidgetTests
      # Widget extension sources (excluding KigoWidget.swift which has @main)
      - path: Sources/KigoWidgetExtension/KigoWidgetEntry.swift
      - path: Sources/KigoWidgetExtension/WidgetTimelineBuilder.swift
      # Shared Foundation-only types from the Kigo app target
      - path: Sources/Kigo/Manifest.swift
      - path: Sources/Kigo/DayKey.swift
      - path: Sources/Kigo/DateProvider.swift
      - path: Sources/Kigo/TodayResolution.swift
      - path: Sources/Kigo/ContentSource.swift
      # Slice #71: EntitlementSharedStore protocol — Foundation-only (no StoreKit).
      - path: Sources/Kigo/EntitlementSharedStore.swift
    dependencies:
      - sdk: WidgetKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomeitotameigo.kigoWidgetTests
        SWIFT_VERSION: "6.0"
        CODE_SIGNING_ALLOWED: "NO"

schemes:
  Kigo:
    build:
      targets:
        Kigo: all
        KigoWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: KigoTests
          parallelizable: false
        - name: KigoUITests
          parallelizable: false
        - name: KigoWidgetTests
          parallelizable: false
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  KigoWidgetExtension:
    build:
      targets:
        KigoWidgetExtension: all
    run:
      config: Debug
    analyze:
      config: Debug
    archive:
      config: Release
