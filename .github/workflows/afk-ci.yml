name: afk-ci

# Clean-checkout build+test gate for the afk- loop, on macOS (expensive: macOS
# Actions minutes bill at 10x). Scoped to integration->main PRs only — NOT per
# slice, and NOT on push to main (that re-ran the same commit the PR already
# tested, double-billing macOS minutes). Slice PRs target integration/* and are
# verified by
# afk-advance re-running the suite in-session, plus the trivial slice-gate check.
# Tolerant: while the repo has no XcodeGen manifest yet (pre walking-skeleton)
# the job exits 0; once project.yml exists it really builds and tests — never
# relax that into an unconditional pass.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: afk-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  afk-ci:
    name: afk-ci
    runs-on: macos-26
    timeout-minutes: 45
    env:
      SCHEME: Kigo
      DESTINATION: 'platform=iOS Simulator,name=iPhone 17'
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          set -euo pipefail
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "${latest:-}" ]; then sudo xcode-select -s "$latest"; fi
          xcodebuild -version

      - name: Build and test (or pass if no manifest yet)
        run: |
          set -euo pipefail
          if [ ! -f project.yml ]; then
            echo "No project.yml yet — pre walking-skeleton. Passing tolerantly."
            exit 0
          fi
          echo "project.yml present — generating project and running tests."
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen generate
          set -o pipefail
          # Fail fast on a hang: an inner 20-min cap (perl alarm — macOS runners
          # have no coreutils `timeout`) so a wedged test or simulator does not burn
          # the full 45-min job at 10x macOS minutes; XCTest execution-time
          # allowances force an individual stuck test to fail with a diagnostic at
          # 120s instead of hanging. See CLAUDE.md "Build & test" for the rationale.
          perl -e 'alarm shift; exec @ARGV' 1200 \
            xcodebuild test \
              -scheme "$SCHEME" \
              -destination "$DESTINATION" \
              -resultBundlePath TestResults \
              -test-timeouts-enabled YES \
              -default-test-execution-time-allowance 120 \
              -maximum-test-execution-time-allowance 300 \
              CODE_SIGNING_ALLOWED=NO \
              | tee xcodebuild.log
          grep -q '\*\* TEST SUCCEEDED \*\*' xcodebuild.log
